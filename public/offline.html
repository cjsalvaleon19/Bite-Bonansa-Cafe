<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline – Bite Bonansa Cafe</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        font-family: sans-serif;
        color: #fff;
        text-align: center;
        padding: 20px;
      }
      h1 { color: #ffc107; font-size: 28px; margin-bottom: 16px; }
      p  { color: #999; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
      button {
        background: #ffc107;
        color: #0a0a0a;
        border: none;
        padding: 12px 28px;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: #ffb300; }
    </style>
  </head>
  <body>
    <div>
      <h1>☕ Bite Bonansa Cafe</h1>
      <p>
        You're offline and this page hasn't been cached yet.<br />
        Please check your internet connection and try again.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
